<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Unidad II
</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

body{
    background:#111827;
    color:white;
}

.navbar{
    background:#0f172a;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 50px;
}

.navbar h2{ color:#60a5fa; }

.navbar a{
    color:white;
    text-decoration:none;
    margin-left:20px;
}

.logout{ color:#ef4444 !important; }

.titulo{
    text-align:center;
    padding:50px 20px;
}

.titulo h1{
    font-size:55px;
    color:#60a5fa;
}

.grid{
    width:90%;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:25px;
    padding-bottom:60px;
}

.card{
    background:#1e293b;
    border-radius:20px;
    padding:25px;
}

.card h3{
    color:#60a5fa;
    margin-bottom:15px;
}

.archivo{
    background:#0f172a;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
}

.archivo p{
    margin-bottom:5px;
}

.btn{
    background:#2563eb;
    color:white;
    padding:6px 10px;
    border-radius:8px;
    border:none;
    cursor:pointer;
    margin:3px;
    text-decoration:none;
}

.btn:hover{
    background:#1d4ed8;
}

input{
    width:100%;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}

</style>

<!-- SOLO UNA VEZ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>
<body>

<div class="navbar">
    <h2>Unidad I</h2>
    <div>
        <a href="introduccion.html">← Volver</a>
        <a href="#" class="logout" onclick="cerrarSesion()">Cerrar Sesión</a>
    </div>
</div>

<div class="titulo">
    <h1>UNIDAD II</h1>
</div>

<div class="grid" id="contenedor"></div>

<script>

// ⚠️ CAMBIO IMPORTANTE → nombre distinto (evita error duplicado)
const cliente = window.supabase.createClient(
    "https://dkcswvploklhajstyntd.supabase.co",
    "sb_publishable_9bvZjgFd9SjBYMyKwAcD9w_OWUHBPi2"
);

// tu sistema de roles sigue funcionando
let rol = localStorage.getItem("rol") || "admin";

// semanas
const semanas = ["semana1","semana2","semana3","semana4"];

// render
async function render(){

    let contenedor = document.getElementById("contenedor");
    contenedor.innerHTML = "";

    for(let semana of semanas){

        let card = document.createElement("div");
        card.className = "card";

        let html = `<h3>${semana.toUpperCase()}</h3>`;

        const { data } = await cliente
            .storage
            .from("portafolio")
            .list(semana);

        if(!data || data.length === 0){
            html += `<p style="color:gray;">No hay archivos</p>`;
        }else{

            data.forEach(file => {

                const path = `${semana}/${file.name}`;

                const url = cliente
                    .storage
                    .from("portafolio")
                    .getPublicUrl(path).data.publicUrl;

                html += `
                    <div class="archivo">
                        <p>${file.name}</p>

                        <a href="${url}" target="_blank" class="btn">Ver</a>

                        ${rol === "admin" ? `
                            <button onclick="eliminar('${path}')" class="btn" style="background:red;">Eliminar</button>
                        ` : ""}
                    </div>
                `;
            });
        }

        // ADMIN SUBIR
        if(rol === "admin"){
            html += `
                <input type="file" id="${semana}">
                <button onclick="subir('${semana}')" class="btn">Subir</button>
            `;
        }

        card.innerHTML = html;
        contenedor.appendChild(card);
    }
}

// subir
async function subir(semana){

    let file = document.getElementById(semana).files[0];

    if(!file){
        alert("Selecciona archivo");
        return;
    }

    const path = `${semana}/${Date.now()}_${file.name}`;

    const { error } = await cliente
        .storage
        .from("portafolio")
        .upload(path, file);

    if(error){
        alert("Error al subir");
        console.log(error);
        return;
    }

    alert("Archivo subido ✅");
    render();
}

// eliminar
async function eliminar(path){

    await cliente
        .storage
        .from("portafolio")
        .remove([path]);

    render();
}

// cerrar
function cerrarSesion(){
    localStorage.clear();
    window.location.href = "index.html";
}

// iniciar
render();

</script>

</body>
</html>
